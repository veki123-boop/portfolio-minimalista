<!doctype html>
<html lang="es">
  <head>
    <!-- ============================================
         METADATOS BÁSICOS Y SEGURIDAD
         ============================================ -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- Fuerza HTTPS en todos los navegadores -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'wasm-unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://*.umami.is;
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                   font-src 'self' https://fonts.gstatic.com data:;
                   img-src 'self' https: data:;
                   connect-src 'self' https://*.umami.is;
                   frame-ancestors 'none';
                   base-uri 'self';
                   form-action 'self';" />
    
    <!-- Previene clickjacking -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    
    <!-- Protección contra MIME sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    
    <!-- Protección contra XSS (navegadores antiguos) -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    
    <!-- Referrer Policy para privacidad -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- Permissions Policy (anteriormente Feature Policy) -->
    <meta http-equiv="Permissions-Policy" 
          content="accelerometer=(), 
                   ambient-light-sensor=(), 
                   autoplay=(), 
                   battery=(), 
                   camera=(), 
                   display-capture=(), 
                   document-domain=(), 
                   encrypted-media=(), 
                   execution-while-not-rendered=(), 
                   execution-while-out-of-viewport=(), 
                   fullscreen=(self), 
                   geolocation=(), 
                   gyroscope=(), 
                   magnetometer=(), 
                   microphone=(), 
                   midi=(), 
                   navigation-override=(), 
                   payment=(), 
                   picture-in-picture=(), 
                   publickey-credentials-get=(), 
                   sync-xhr=(), 
                   usb=(), 
                   vr=(), 
                   xr-spatial-tracking=()" />

    <!-- ============================================
         SEO Y METADATOS
         ============================================ -->
    <title>Iván Gutierrez - Portfolio Minimalista</title>
    <meta name="description" 
          content="Portfolio personal de Iván Gutierrez. Técnico en Sistemas, Desarrollador Full Stack especializado en administración de servidores, máquinas virtuales y desarrollo web." />
    <meta name="keywords" 
          content="Iván Gutierrez, Portfolio, Desarrollador, Técnico Sistemas, Administración Servidores, Minecraft, Máquinas Virtuales, Web Developer" />
    <meta name="author" content="Iván Gutierrez Romero" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />
    
    <!-- Open Graph para redes sociales -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Iván Gutierrez - Portfolio Minimalista" />
    <meta property="og:description" 
          content="Técnico en Sistemas & Desarrollador Full Stack. Especializado en administración de servidores, máquinas virtuales y soluciones web innovadoras." />
    <meta property="og:url" content="https://portfolio-minimalista.manus.space" />
    <meta property="og:site_name" content="Iván Gutierrez Portfolio" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Iván Gutierrez - Portfolio Minimalista" />
    <meta name="twitter:description" 
          content="Técnico en Sistemas & Desarrollador Full Stack" />

    <!-- ============================================
         PRECONEXIONES Y OPTIMIZACIÓN
         ============================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Fuentes Google (con crossorigin para CORS) -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" 
          rel="stylesheet" 
          crossorigin />

    <!-- ============================================
         FAVICON Y ICONOS
         ============================================ -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ============================================
         CANONICAL URL
         ============================================ -->
    <link rel="canonical" href="https://portfolio-minimalista.manus.space" />

    <!-- ============================================
         ROBOTS Y INDEXACIÓN
         ============================================ -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="bingbot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- ============================================
         PRELOAD CRÍTICOS
         ============================================ -->
    <link rel="preload" href="/src/main.tsx" as="script" type="module" />
  </head>

  <body>
    <!-- Root element para React -->
    <div id="root" role="application" aria-label="Aplicación del portfolio"></div>

    <!-- ============================================
         SCRIPTS CON SEGURIDAD
         ============================================ -->
    
    <!-- Script principal de React (con async para no bloquear) -->
    <script type="module" src="/src/main.tsx" async></script>

    <!-- Analytics (Umami) con seguridad -->
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
      data-domains="portfolio-minimalista.manus.space"
      data-auto-track="true"
      data-do-not-track="true"
      crossorigin="anonymous">
    </script>

    <!-- ============================================
         NOSCRIPT FALLBACK
         ============================================ -->
    <noscript>
      <p style="
        color: #ff4d4d;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 2rem;
        text-align: center;
        background: #0a0a0a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      ">
        ⚠️ Este sitio requiere JavaScript habilitado para funcionar correctamente.
        Por favor, habilita JavaScript en tu navegador.
      </p>
    </noscript>

    <!-- ============================================
         SEGURIDAD: NO MODIFICAR ESTOS COMENTARIOS
         ============================================ -->
    <!-- 
      MEDIDAS DE SEGURIDAD IMPLEMENTADAS:
      
      1. Content Security Policy (CSP):
         - Restringe fuentes de scripts a 'self' y dominios confiables
         - Previene inyección de código malicioso
         - Bloquea frame embedding (X-Frame-Options: DENY)
      
      2. Protección contra XSS:
         - X-XSS-Protection para navegadores antiguos
         - X-Content-Type-Options: nosniff previene MIME sniffing
      
      3. Privacidad:
         - Referrer Policy: strict-origin-when-cross-origin
         - Permissions Policy: Desactiva acceso a cámara, micrófono, ubicación, etc.
      
      4. Validación:
         - Charset UTF-8 explícito
         - Viewport restrictivo (máximo zoom 5x)
         - Canonical URL para evitar contenido duplicado
      
      5. Analytics seguro:
         - Umami respeta Do Not Track
         - Datos anónimos
         - Sin cookies de terceros
      
      6. SEO seguro:
         - Robots meta tags
         - Open Graph para redes sociales
         - Structured data ready
    -->
  </body>
</html>
