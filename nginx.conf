# ============================================
# CONFIGURACIÓN NGINX SEGURA
# Portfolio Minimalista - Iván Gutierrez
# ============================================

# Bloquea acceso directo a este archivo
# Uso: Copiar contenido a /etc/nginx/sites-available/portfolio-minimalista

server {
    # ============================================
    # PUERTOS Y DOMINIOS
    # ============================================
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name portfolio-minimalista.manus.space www.portfolio-minimalista.manus.space;
    
    # ============================================
    # CERTIFICADOS SSL (Manus proporciona automáticamente)
    # ============================================
    ssl_certificate /etc/letsencrypt/live/portfolio-minimalista.manus.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio-minimalista.manus.space/privkey.pem;
    
    # Configuración SSL segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # ============================================
    # REDIRECCIÓN HTTP A HTTPS
    # ============================================
    if ($scheme != "https") {
        return 301 https://$server_name$request_uri;
    }
    
    # ============================================
    # REDIRECCIÓN WWW A NO-WWW (opcional)
    # ============================================
    if ($host = www.portfolio-minimalista.manus.space) {
        return 301 https://portfolio-minimalista.manus.space$request_uri;
    }
    
    # ============================================
    # RAÍZ DEL SITIO
    # ============================================
    root /home/ubuntu/portfolio-minimalista/dist/public;
    index index.html;
    
    # ============================================
    # HEADERS DE SEGURIDAD
    # ============================================
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Previene clickjacking
    add_header X-Frame-Options "DENY" always;
    
    # Protección contra MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Protección XSS
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), sync-xhr=(), usb=(), vr=(), xr-spatial-tracking=()" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://*.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https: data:; connect-src 'self' https://*.umami.is; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    
    # ============================================
    # COMPRESIÓN GZIP
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    
    # ============================================
    # CACHÉ DE NAVEGADOR
    # ============================================
    
    # Archivos estáticos: 1 año
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # HTML: Sin caché
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # ============================================
    # PROTECCIÓN CONTRA ACCESO DIRECTO
    # ============================================
    
    # Bloquea archivos sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Bloquea acceso a archivos de configuración
    location ~ \.(env|json|config|sql|log|sh|bat|exe|dll)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ============================================
    # RUTAS SPA (Single Page Application)
    # ============================================
    
    # Redirige todas las rutas a index.html para que React Router maneje
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # ============================================
    # LOGGING Y MONITOREO
    # ============================================
    
    access_log /var/log/nginx/portfolio-access.log combined;
    error_log /var/log/nginx/portfolio-error.log warn;
    
    # ============================================
    # LÍMITES DE TASA (Rate Limiting)
    # ============================================
    
    # Limita solicitudes POST (formularios)
    limit_req_zone $binary_remote_addr zone=form_limit:10m rate=5r/m;
    location ~ ^/api/contact$ {
        limit_req zone=form_limit burst=10 nodelay;
    }
    
    # ============================================
    # TIMEOUTS
    # ============================================
    
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 5s 5s;
    send_timeout 10s;
    
    # ============================================
    # TAMAÑO MÁXIMO DE CUERPO
    # ============================================
    
    client_max_body_size 10M;
}

# ============================================
# SERVIDOR DE REDIRECCIÓN (HTTP a HTTPS)
# ============================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}
